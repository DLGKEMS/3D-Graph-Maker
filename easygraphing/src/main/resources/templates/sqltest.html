<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>CSV 업로드</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <script src="https://use.fontawesome.com/releases/v5.2.0/js/all.js"></script>
</head>
<body class="bg-primary">
<div id="layoutAuthentication">
    <i class="fas fa-spinner fa-10x fa-spin" id="custom-spinner"></i>
    <div id="layoutAuthentication_content">
        <main>
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <div class="card shadow-lg border-0 rounded-lg mt-5">
                        <div class="card-header"><h3 class="text-center font-weight-bold my-4">3D Graph Maker</h3></div>
                        <div class="card-body">
                            <div class="small mb-3 text-muted">.csv 파일을 넣어주세요.</div>
                            <form action="/upload" method="post" enctype="multipart/form-data" id="form-upload-file">
                                <div class="d-flex flex-column align-items-center">
                                    <input type="file" name="file" accept=".csv" class="form-control" required>
                                    <button type="submit" class="btn  mt-2 btn-3d red" id="btn-upload-file">Upload</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<div id="upload-cover"><div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="js/scripts.js"></script>
<script src="js/sqlTest.js" type="module"></script>
<link href="/css/sqlTest.css" rel="stylesheet" />
</body>
</html>
